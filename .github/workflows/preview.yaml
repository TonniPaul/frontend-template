name: Vercel Preview Deployment

on:
  push:
    branches-ignore: [main]
jobs:
  Deploy-Preview:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      BRANCH_NAME: ${{ github.head_ref || github.ref_name }}

    environment:
      name: preview
      url: ${{ steps.seturl.outputs.url }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Vercel CLI
        run: pnpm add --global vercel@latest

      - name: Pull Vercel Preview Environment Information
        run: |
          vercel pull \
            --yes \
            --environment=preview \
            --git-branch=${{ github.ref == 'refs/heads/staging' && 'staging' || 'dev' }} \
            --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Project Artifacts
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy Project Artifacts to Vercel
        run: |
          vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }} | tee deploy.log

      - id: seturl
        name: Set preview URL
        run: echo "url=$(tail -1 deploy.log)" >> $GITHUB_OUTPUT

      - name: Print preview URL
        run: echo "${{ steps.seturl.outputs.url }}"